name: Update Lucide

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'lucide-static version (defaults to latest)'
        required: false
        type: string

jobs:
  update:
    # macos-15 because the snapshot record step needs CoreGraphics/ImageIO,
    # which are Apple-only. Node generation runs here too — the extra cost
    # is small versus the alternative of two coordinated jobs.
    runs-on: macos-15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Check for new version
        id: check
        run: node Tools/generate-icons.mjs --check
        continue-on-error: true

      - name: Apply update
        id: apply
        if: steps.check.outcome == 'failure' || inputs.version != ''
        run: node Tools/generate-icons.mjs --apply ${{ inputs.version && format('--version {0}', inputs.version) || '' }}

      - name: Record snapshot baselines
        if: steps.check.outcome == 'failure' || inputs.version != ''
        env:
          SNAPSHOT_RECORD: '1'
        run: swift test --filter SnapshotTests

      - name: Open pull request
        if: steps.check.outcome == 'failure' || inputs.version != ''
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/lucide-update
          commit-message: 'Update Lucide to ${{ steps.apply.outputs.version }}'
          title: 'Update Lucide to ${{ steps.apply.outputs.version }}'
          body: |
            Automated update from `update-icons.yml`.

            See `Tools/lucide-version.json` for the new pinned version.
            Snapshot PNGs under `Tests/LucideTests/__Snapshots__/` are
            re-recorded automatically — review the visual diff to spot
            any unexpected rendering changes.
          add-paths: |
            Sources/Lucide/
            Tools/lucide-version.json
            Tests/LucideTests/__Snapshots__/
